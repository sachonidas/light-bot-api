version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: luz-bot-db
    environment:
      POSTGRES_USER: luzbot
      POSTGRES_PASSWORD: luzbot_dev
      POSTGRES_DB: luzbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
